<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RC Coder</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">⚡ RC Coder</div>
    <button id="newBtn" class="new-btn">+ Nova sessão</button>

    <div class="section-title">Sessions</div>
    <div id="sessions" class="sessions"></div>

    <div class="sidebar-foot">
      <div class="status" id="status">proxy: …</div>
      <button id="themeBtn" class="ghost">🌙</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="sess-badge" id="sessBadge">nenhuma sessão</div>
      <div class="spacer"></div>
      <label class="model-label">model
        <select id="modelSelect" class="model-select">
          <option value="deepseek-reasoner">deepseek-reasoner</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro</option>
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-v3">deepseek-v3</option>
        </select>
      </label>
      <button id="treeBtn" class="ghost">🌳</button>
    </header>

    <section id="chat" class="chat"></section>

    <div id="toolsPanel" class="tools-panel hidden">
      <div class="tools-head">Tool calls
        <button id="treeClose" class="ghost small">✕</button>
      </div>
      <div id="tree" class="tree"></div>
    </div>

    <footer class="footer">
      <textarea id="input" placeholder="Mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
      <button id="send">➤</button>
    </footer>
  </main>

  <script src="/app.js"></script>
</body>
</html>
